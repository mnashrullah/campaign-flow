# Full stack: Postgres + Redis + backend API + worker + web.
#
#   docker compose up -d postgres redis          # infra only (for local dev)
#   docker compose --profile app up --build      # + api + worker + web
#   docker compose --profile app up --scale worker=3   # scale send throughput
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: campaign
      POSTGRES_PASSWORD: campaign
      POSTGRES_DB: campaign_flow
    ports:
      - "5433:5432" # host 5433 to avoid clashing with other local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"] # AOF: queue + rate state survive restart
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./campaign-flow-backend
    profiles: ["app"]
    environment: &appenv
      DATABASE_URL: postgres://campaign:campaign@postgres:5432/campaign_flow
      REDIS_URL: redis://redis:6379
      PROVIDER: ${PROVIDER:-dryrun}
      PORT: "4000"
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    command: sh -c "npm run db:migrate && npm run start"
    ports:
      - "4000:4000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: ./campaign-flow-backend
    profiles: ["app"]
    environment: *appenv
    command: npm run worker:prod
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  web:
    build:
      context: ./campaign-flow-web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    profiles: ["app"]
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
